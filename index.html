<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to top right, #fce4ec, #e3f2fd, #f3e5f5);
    overflow-y: auto;
}

/* 🌸 PAGE LAYOUT */
.page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 0;
}

/* 🎞️ SIDE MEMORY ROLLS */
.memory-column {
    width: 20%;
    overflow: hidden;
    position: relative;
}

.memory-track {
    display: flex;
    flex-direction: column;
    animation: scrollUp 20s linear infinite;
}

.memory-track img {
    width: 90%;
    margin: 10px auto;
    border-radius: 15px;
    object-fit: cover;
    height: 150px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* reverse animation for right side */
.right .memory-track {
    animation: scrollDown 20s linear infinite;
}

@keyframes scrollUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-50%);}
}

@keyframes scrollDown {
    0% {transform: translateY(-50%);}
    100% {transform: translateY(0);}
}

/* 💌 CENTER CARD */
.container {
    width: 420px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    color: #6a1b9a;
}

/* INPUT */
select, input {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
}

/* BUTTON */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #ba68c8;
    color: white;
    cursor: pointer;
}

/* IMAGE */
#photo {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin-top: 10px;
    border: 3px solid #ce93d8;
}

/* MESSAGE */
.message {
    margin-top: 20px;
    padding: 18px;
    border-radius: 15px;
    background: rgba(255,255,255,0.85);
    line-height: 1.6;
    color: #444;
}

.hidden { display: none; }

#error { color: #d81b60; }

</style>
</head>
